<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국사 퀴즈</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .stats {
            font-size: 1rem;
            font-weight: bold;
            color: #ff007f;
        }

        .question-box {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: center;
            min-height: 80px;
            animation: fadeIn 0.6s ease-out;
        }

        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #eeeeee;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 25px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s ease;
        }

        .choice-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: #00f2fe;
            color: #00f2fe;
            transform: translateY(-2px);
        }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .answer-input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px;
            font-size: 1.1rem;
            border-radius: 14px;
            color: #fff;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .answer-input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .submit-btn {
            background: #00f2fe;
            color: #15102a;
            border: none;
            padding: 15px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #00b09b;
            color: #fff;
        }

        .choice-btn.correct { background: linear-gradient(90deg, #00b09b, #96c93d) !important; color: #fff !important; }
        .choice-btn.wrong { background: linear-gradient(90deg, #ff416c, #ff4b2b) !important; color: #fff !important; }

        .feedback-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            text-align: center;
            margin-bottom: 25px;
            display: none;
            white-space: pre-line;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            display: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1) 0%, rgba(79, 172, 254, 0.1) 100%);
            z-index: 1;
            filter: blur(1px);
        }
        .circle1 { width: 300px; height: 300px; top: -10%; left: -10%; }
        .circle2 { width: 400px; height: 400px; bottom: -15%; right: -10%; background: linear-gradient(135deg, rgba(255, 0, 127, 0.08) 0%, rgba(255, 75, 43, 0.08) 100%); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="game-container">
        <div class="header">
            <div class="title" id="quiz-title">🇰🇷 한국사 능력 챌린지</div>
            <div class="stats" id="score-board">SCORE: 000 | COMBO: 0</div>
        </div>

        <div class="question-box" id="question">문제를 불러오는 중입니다...</div>

        <div id="interaction-box"></div>

        <div class="feedback-box" id="feedback"></div>

        <button class="action-btn" id="action-btn" onclick="handleActionClick()">다음 문제로 전진 ➡️</button>
    </div>

    <script>
        const quizList = [
            // ==========================================
            // 주관식 문제 (10문항)
            // ==========================================
            {
                "type": "short",
                "q": "Q. 청동기 시대를 대표하는 무덤 양식으로, 큰 돌을 받쳐 세우거나 땅에 묻어 만든 선사 시대의 무덤은 무엇인가요?",
                "a": "고인돌",
                "e": "🎯 고인돌은 청동기 시대의 대표적인 무덤으로, 당시 지배층의 정치적 권력과 경제적 힘을 보여주는 유물입니다."
            },
            {
                "type": "short",
                "q": "Q. 단군왕검이 세운 우리나라 역사상 최초의 국가 이름은 무엇인가요?",
                "a": "고조선",
                "e": "🎯 고조선은 청동기 문화를 바탕으로 세워진 우리나라 역사상 최초의 국가입니다."
            },
            {
                "type": "short",
                "q": "Q. 삼국 시대 중 가장 먼저 한강 유역을 차지하며 전성기를 맞이한 나라는 어디인가요?",
                "a": "백제",
                "e": "🎯 백제는 4세기 근초고왕 때 한강 유역을 바탕으로 가장 먼저 전성기를 맞이했습니다."
            },
            {
                "type": "short",
                "q": "Q. 삼국을 통일한 신라가 당나라의 군대를 최종적으로 격파하며 대동강에서 원산만까지의 영토를 확보하며 삼국 통일을 완성한 해는 몇 년인가요? (숫자만 입력)",
                "a": "676",
                "e": "🎯 신らは 676년 기벌포 전투 등을 끝으로 당나라 세력을 몰아내고 삼국 통일을 완수했습니다."
            },
            {
                "type": "short",
                "q": "Q. 고려 시대에 벽란도를 통해 전 세계에 이름을 알리며, 오늘날 대한민국의 영어 이름인 'Korea'의 유래가 된 이 나라의 이름은 무엇인가요?",
                "a": "고려",
                "e": "🎯 고려는 외국과의 무역이 활발했으며, 송나라, 아라비아 상인 등을 통해 '코리아(Korea)'라는 이름으로 널리 알려졌습니다."
            },
            {
                "type": "short",
                "q": "Q. 조선 시대에 세종 대왕이 백성들이 글을 쉽게 읽고 쓸 수 있도록 창제한 우리나라의 고유 문자는 무엇인가요?",
                "a": "훈민정음",
                "e": "🎯 세종 대왕은 백성을 사랑하는 마음으로 1443년에 훈민정음(한글)을 창제하였습니다."
            },
            {
                "type": "short",
                "q": "Q. 임진왜란 때 한산도 대첩, 명량 대첩 등에서 활약하며 바다를 지켜낸 조선의 위대한 장군은 누구인가요?",
                "a": "이순신",
                "e": "🎯 이순신 장군은 뛰어난 전략과 거북선 등을 활용하여 임진왜란 당시 일본 수군을 상대로 큰 승리를 거두었습니다."
            },
            {
                "type": "short",
                "q": "Q. 일제 강점기인 1919년, 민족대표 33인의 독립 선언서 낭독을 시작으로 온 국민이 만세를 부르며 일제에 저항한 최대 규모의 민족 운동은 무엇인가요?",
                "a": "3·1운동",
                "e": "🎯 3·1 운동은 신분과 지역을 초월하여 온 민족이 참여한 최대 규모의 항일 독립운동입니다."
            },
            {
                "type": "short",
                "q": "Q. 광복 이후 남한과 북한의 의견 대립과 주변국의 영향으로 한반도가 38도선을 경계로 나누어지게 된 현상을 무엇이라 하나요?",
                "a": "국토분단",
                "e": "🎯 광복 이후 신탁통치 문제와 남북의 정치적 갈등으로 인해 한반도는 분단이라는 아픔을 겪게 되었습니다."
            },
            {
                "type": "short",
                "q": "Q. 1960년 독재 정권과 부정 선거에 맞서 시민과 학생들이 중심이 되어 민주주의를 지켜낸 대한민국 최초의 성공한 민주화 운동은 무엇인가요?",
                "a": "4·19혁명",
                "e": "🎯 4·19 혁명은 이승만 정부의 3·15 부정선거에 항거하여 일어난 독재 정권을 무너뜨린 민주주의 혁명입니다."
            },
            // ==========================================
            // 객관식 문제 (20문항)
            // ==========================================
            {
                "type": "choice",
                "q": "Q. 구석기 시대 사람들의 생활 모습으로 올바른 것은 무엇인가요?",
                "c": ["① 돌을 갈아서 만든 간석기를 사용했다.", "② 정착 생활을 하며 움집을 짓고 살았다.", "③ 주로 동굴이나 바위 그늘에 살며 이동 생활을 했다.", "④ 벼농사를 대규모로 지었다."],
                "a": 2,
                "e": "🎯 구석기 시대 사람들은 사냥과 채집을 하며 먹을거리를 찾아 이동 생활을 했고, 동굴이나 막집에서 지냈습니다."
            },
            {
                "type": "choice",
                "q": "Q. 신석기 시대에 음식을 끓이거나 식량을 저장하기 위해 진흙으로 구워 만든 대표적인 토기는 무엇인가요?",
                "c": ["① 빗살무늬 토기", "② 미송리식 토기", "③ 민무늬 토기", "④ 청자"],
                "a": 0,
                "e": "🎯 겉면에 빗살 같은 무늬가 새겨진 빗살무늬 토기는 신석기 시대를 대표하는 유물입니다."
            },
            {
                "type": "choice",
                "q": "Q. 고조선의 사회 모습을 알 수 있는 법으로, 생명과 재산을 소중히 여겼음을 보여주는 법은 무엇인가요?",
                "c": ["① 헌법", "② 8조법", "③ 경국대전", "④ 홍범 14조"],
                "a": 1,
                "e": "🎯 고조선에는 사회 질서를 유지하기 위한 8조의 법이 있었으며, 현재는 3개의 조항이 전해집니다."
            },
            {
                "type": "choice",
                "q": "Q. 고구려의 전성기를 이끈 왕으로, 한강 유역까지 영토를 넓히고 호우명 그릇 등을 통해 신라에 영향력을 행사했음을 보여주는 왕은 누구인가요?",
                "c": ["① 동명성왕", "② 근초고왕", "③ 관계토대왕", "④ 장수왕"],
                "a": 3,
                "e": "🎯 장수왕은 평양으로 수도를 옮기고 적극적인 남진 정책을 펼쳐 한강 유역을 차지했습니다."
            },
            {
                "type": "choice",
                "q": "Q. 신라의 청소년 수양 단체로, 삼국 통일 과정에서 김유신 등 수많은 인재를 배출한 조직은 무엇인가요?",
                "c": ["① 화랑도", "② 6두품", "③ 집사부", "④ 서당"],
                "a": 0,
                "e": "🎯 화랑도는 신라의 인재 양성 단체로, 신체 단련과 학문 수양을 통해 삼국 통일의 밑거름이 되었습니다."
            },
            {
                "type": "choice",
                "q": "Q. 고구려 멸망 이후 대조영이 고구려 유민들과 말갈족을 이끌고 동모산 근처에 세운 국가의 이름은 무엇인가요?",
                "c": ["① 고려", "② 발해", "③ 백제", "④ 후고구려"],
                "a": 1,
                "e": "🎯 발해는 고구려의 영토와 문화를 계승하여 옛 고구려 땅에 세워진 국가입니다."
            },
            {
                "type": "choice",
                "q": "Q. 고려를 세우고 후삼국을 통일한 왕으로, 호족들을 포섭하기 위해 혼인 정책을 쓰고 발해 유민을 받아들인 인물은 누구인가요?",
                "c": ["① 광종", "② 공민왕", "③ 왕건", "④ 견훤"],
                "a": 2,
                "e": "🎯 태조 왕건은 고려를 건국하고 후삼국을 통일한 후 백성들의 삶을 안정시키는 정책을 펼쳤습니다."
            },
            {
                "type": "choice",
                "q": "Q. 고려 시대에 부처의 힘으로 몽골의 침략을 물리치기 위해 만든 세계 기록 유산은 무엇인가요?",
                "c": ["① 직지심체요절", "② 팔만대장경", "③ 무구정광대다라니경", "④ 조선왕조실록"],
                "a": 1,
                "e": "🎯 팔만대장경(재조대장경)은 몽골의 침입을 불교의 힘으로 극복하고자 정성을 다해 만든 목판입니다."
            },
            {
                "type": "choice",
                "q": "Q. 고려의 독창적인 유물로, 흙으로 모양을 빚은 후 표면에 무늬를 파내고 다른 종류의 흙을 채워 구워낸 도자기는 무엇인가요?",
                "c": ["① 상감 청자", "② 백자 달항아리", "③ 분청사기", "④ 옹기"],
                "a": 0,
                "e": "🎯 고려의 상감 청자는 독창적인 상감 기법을 활용하여 아름다운 푸른빛과 문양을 자랑합니다."
            },
            {
                "type": "choice",
                "q": "Q. 조선을 건국한 인물과, 조선이 국가의 기본 이념으로 삼은 학문이 바르게 짝지어진 것은 무엇인가요?",
                "c": ["① 왕건 - 불교", "② 이성계 - 유교(성리학)", "③ 이성계 - 불교", "④ 대조영 - 유교"],
                "a": 1,
                "e": "🎯 태조 이성계는 고려를 무너뜨리고 유교(성리학) 사상을 정치와 생활의 근본으로 삼아 조선을 건국했습니다."
            },
            {
                "type": "choice",
                "q": "Q. 조선 시대의 수도로, 오늘날 대한민국의 수도인 서울의 옛 이름은 무엇인가요?",
                "c": ["① 한양", "② 개경", "③ 경주", "④ 부여"],
                "a": 0,
                "e": "🎯 조선은 국토의 중심에 위치하고 한강 교통이 편리한 한양으로 도읍을 정했습니다."
            },
            {
                "type": "choice",
                "q": "Q. 조선 후기 영조와 정조 시기에 백성들의 삶을 실질적으로 이롭게 하고자 발전한 학문 분야는 무엇인가요?",
                "c": ["① 성리학", "② 불교 학문", "③ 실학", "④ 신학"],
                "a": 2,
                "e": "🎯 실학은 실제 생활에 유용하고 유익한 지식을 연구하여 사회 문제를 해결하려 했던 학문입니다."
            },
            {
                "type": "choice",
                "q": "Q. 조선 후기 정조 대왕이 자신의 정치적 이상을 실현하고 세자의 군사 기반을 다지기 위해 개성에 축조한 성곽 건축물은 무엇인가요?",
                "c": ["① 남한산성", "② 수원 화성", "③ 한양도성", "④ 북한산성"],
                "a": 1,

            },
            {
                "type": "choice",
                "q": "Q. 조선 후기 서민 문화의 발달 모습으로 가장 거리가 먼 것은 무엇인가요?",
                "c": ["① 한글 소설과 사설시조가 유행했다.", "② 양반들의 귀족적 생활을 찬양하는 시가 유행했다.", "③ 판소리와 탈춤이 시장과 마당에서 연희되었다.", "④ 민화가 널리 그려져 집안을 장식했다."],
                "a": 1,
                "e": "🎯 조선 후기 서민 문화는 양반들의 위선을 풍자하거나 서민들의 솔직한 감정을 표현하는 방향으로 발달했습니다."
            },
            {
                "type": "choice",
                "q": "Q. 1876년 조선이 외국(일본)과 맺은 최초의 근대적 조약이자, 불평등 조약이었던 것은 무엇인가요?",
                "c": ["① 강화도 조약", "② 한일 병합 조약", "③ 을사늑약", "④ 조미 수호 통상 조약"],
                "a": 0,
                "e": "🎯 강화도 조약은 조선의 자주권을 침해하는 내용을 담은 최초의 근대적이자 불평등한 조약입니다."
            },
            {
                "type": "choice",
                "q": "Q. 1905년 일제가 대한제국의 외교권을 강탈하기 위해 강제로 체결한 조약은 무엇인가요?",
                "c": ["① 강화도 조약", "② 을사늑약", "③ 한일 의정서", "④ 정미 7조약"],
                "a": 1,
                "e": "🎯 일제는 고종 황제의 동의 없이 을사늑약을 강제로 체결하여 대한제국의 외교권을 빼앗았습니다."
            },
            {
                "type": "choice",
                "q": "Q. 3·1 운동의 결과로, 독립운동을 더욱 체계적이고 조직적으로 이끌기 위해 중국 상하이에 세워진 단체는 무엇인가요?",
                "c": ["① 신간회", "② 독립협회", "③ 대한민국 임시 정부", "④ 의열단"],
                "a": 2,
                "e": "🎯 3·1 운동 이후 독립운동가들은 민족의 구심점이 될 대한민국 임시 정부를 수립하였습니다."
            },
            {
                "type": "choice",
                "q": "Q. 1950년 6월 25일 북한군의 기습 남침으로 시작되어 한반도 전체에 큰 피해를 입히고 현재까지 휴전 상태로 이어지고 있는 전쟁은 무엇인가요?",
                "c": ["① 러일 전쟁", "② 청일 전쟁", "③ 베트남 전쟁", "④ 6·25 전쟁"],
                "a": 3,
                "e": "🎯 6·25 전쟁은 동족상잔의 비극으로 수많은 인명 피해와 국토 황폐화를 낳았고 지금까지 분단 상태가 지속되고 있습니다."
            },
            {
                "type": "choice",
                "q": "Q. 1987년 6월, 시민들이 '호헌 철폐'와 '독재 타도'를 외치며 대통령 직선제(국민이 직접 대통령을 뽑는 제도)를 쟁취해 낸 민주화 운동은 무엇인가요?",
                "c": ["① 4·19 혁명", "② 5·18 민주화 운동", "③ 6월 민주 항쟁", "④ 3·15 의거"],
                "a": 2,
                "e": "🎯 6월 민주 항쟁의 결과로 전두환 군사 독재 정권은 평화적 정권 이양과 대통령 직선제를 수용하는 6·29 선언을 발표했습니다."
            },
            {
                "type": "choice",
                "q": "Q. 1970년대 이후 대한민국의 급격한 경제 성장과 공업화를 일컫는 경제적 표현은 무엇인가요?",
                "c": ["① 한강의 기적", "② 새마을 운동", "③ 경제 개발 5개년 계획", "④ 라인강의 기적"],
                "a": 0,
                "e": "🎯 한국 전쟁의 폐허 속에서 세계가 놀랄 만큼 빠른 속도로 이루어낸 대한민국의 경제 성장을 '한강의 기적'이라고 부릅니다."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let combo = 0;
        let isAnswered = false;

        const qEl = document.getElementById('question');
        const intBox = document.getElementById('interaction-box');
        const fBox = document.getElementById('feedback');
        const actBtn = document.getElementById('action-btn');
        const scoreEl = document.getElementById('score-board');

        function initGame() {
            currentIdx = 0;
            score = 0;
            combo = 0;
            updateScoreBoard();
            loadQuiz();
        }

        function loadQuiz() {
            isAnswered = false;
            fBox.style.display = 'none';
            actBtn.style.display = 'none';
            intBox.innerHTML = '';

            if(currentIdx < quizList.length) {
                const currentQuiz = quizList[currentIdx];
                qEl.innerText = currentQuiz.q;

                if (currentQuiz.type === "choice") {
                    const choicesContainer = document.createElement('div');
                    choicesContainer.classList.add('choices-container');
                    
                    currentQuiz.c.forEach((choice, index) => {
                        const button = document.createElement('button');
                        button.classList.add('choice-btn');
                        button.innerText = choice;
                        button.onclick = () => checkChoiceAnswer(index, button);
                        choicesContainer.appendChild(button);
                    });
                    intBox.appendChild(choicesContainer);
                    
                    document.activeElement.blur();
                } 
                else if (currentQuiz.type === "short") {
                    const inputContainer = document.createElement('div');
                    inputContainer.classList.add('input-container');

                    const input = document.createElement('input');
                    input.type = "text";
                    input.classList.add('answer-input');
                    input.placeholder = "정답을 입력하세요 (예: 홍길동)";
                    input.id = "user-input";

                    input.onkeypress = (e) => { 
                        if(e.key === 'Enter') {
                            if(!isAnswered) {
                                checkShortAnswer();
                            }
                        } 
                    };

                    const submitBtn = document.createElement('button');
                    submitBtn.classList.add('submit-btn');
                    submitBtn.innerText = "정답 검사하기 ✔️";
                    submitBtn.onclick = checkShortAnswer;

                    inputContainer.appendChild(input);
                    inputContainer.appendChild(submitBtn);
                    intBox.appendChild(inputContainer);
                    input.focus();
                }
            } else {
                qEl.innerHTML = `🎉 대한민국 역사 마스터 완료! 🎉<br><br>최종 점수: <span style="color:#00f2fe">${score}점</span>`;
                actBtn.innerText = "처음부터 다시 도전하기 🔄";
                actBtn.style.display = 'block';
                actBtn.focus();
            }
        }

        function checkChoiceAnswer(selectedIdx, clickedBtn) {
            if(isAnswered) return;
            isAnswered = true;

            const currentQuiz = quizList[currentIdx];
            const allButtons = intBox.querySelectorAll('.choice-btn');

            if(selectedIdx === currentQuiz.a) {
                combo++;
                score += 100 + (combo * 10);
                clickedBtn.classList.add('correct');
                showFeedback(true, currentQuiz.e);
            } else {
                combo = 0;
                clickedBtn.classList.add('wrong');
                allButtons[currentQuiz.a].classList.add('correct');
                showFeedback(false, currentQuiz.e);
            }
            showNextControls();
        }

        function checkShortAnswer() {
            if(isAnswered) return;
            
            const inputEl = document.getElementById('user-input');
            const userAnswer = inputEl.value.trim();
            if(!userAnswer) return;

            isAnswered = true;
            inputEl.disabled = true;
            intBox.querySelector('.submit-btn').style.display = 'none';

            const currentQuiz = quizList[currentIdx];

            if(userAnswer === currentQuiz.a) {
                combo++;
                score += 100 + (combo * 10);
                inputEl.style.background = 'rgba(0, 176, 155, 0.2)';
                inputEl.style.borderColor = '#00b09b';
                showFeedback(true, currentQuiz.e);
            } else {
                combo = 0;
                inputEl.style.background = 'rgba(255, 65, 108, 0.2)';
                inputEl.style.borderColor = '#ff416c';
                showFeedback(false, `제출한 정답: ${userAnswer}\n\n정답은 [ ${currentQuiz.a} ] 입니다!\n\n${currentQuiz.e}`);
            }
            showNextControls();
        }

        function showFeedback(isCorrect, text) {
            fBox.style.color = isCorrect ? '#00ff7f' : '#ff416c';
            fBox.innerText = isCorrect ? "⭕ 정답입니다!\n\n" + text : "❌ 오답입니다!\n\n" + text;
            fBox.style.display = 'block';
            updateScoreBoard();
        }

        function showNextControls() {
            actBtn.innerText = "다음 문제로 전진 ➡️";
            actBtn.style.display = 'block';
        }

        function handleActionClick() {
            if(currentIdx < quizList.length) {
                currentIdx++;
                loadQuiz();
            } else {
                initGame();
            }
        }

        function updateScoreBoard() {
            scoreEl.innerText = `SCORE: ${String(score).padStart(3, '0')} | COMBO: ${combo}`;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (actBtn.style.display === 'block') {
                    handleActionClick();
                }
            }
        });

        initGame();
    </script>
</body>
</html>
