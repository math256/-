<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국사 퀴즈</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .stats {
            font-size: 1rem;
            font-weight: bold;
            color: #ff007f;
        }

        .question-box {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: center;
            min-height: 80px;
            animation: fadeIn 0.6s ease-out;
        }

        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #eeeeee;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 25px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s ease;
        }

        .choice-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: #00f2fe;
            color: #00f2fe;
            transform: translateY(-2px);
        }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .answer-input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px;
            font-size: 1.1rem;
            border-radius: 14px;
            color: #fff;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .answer-input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .submit-btn {
            background: #00f2fe;
            color: #15102a;
            border: none;
            padding: 15px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #00b09b;
            color: #fff;
        }

        .choice-btn.correct { background: linear-gradient(90deg, #00b09b, #96c93d) !important; color: #fff !important; }
        .choice-btn.wrong { background: linear-gradient(90deg, #ff416c, #ff4b2b) !important; color: #fff !important; }

        .feedback-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            text-align: center;
            margin-bottom: 25px;
            display: none;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            display: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1) 0%, rgba(79, 172, 254, 0.1) 100%);
            z-index: 1;
            filter: blur(1px);
        }
        .circle1 { width: 300px; height: 300px; top: -10%; left: -10%; }
        .circle2 { width: 400px; height: 400px; bottom: -15%; right: -10%; background: linear-gradient(135deg, rgba(255, 0, 127, 0.08) 0%, rgba(255, 75, 43, 0.08) 100%); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="game-container">
        <div class="header">
            <div class="title" id="quiz-title">🇰🇷 한국사 능력 챌린지</div>
            <div class="stats" id="score-board">SCORE: 000 | COMBO: 0</div>
        </div>

        <div class="question-box" id="question">문제를 불러오는 중입니다...</div>

        <div id="interaction-box"></div>

        <div class="feedback-box" id="feedback"></div>

        <button class="action-btn" id="action-btn" onclick="handleActionClick()">다음 문제로 전진 ➡️</button>
    </div>

    <script>
        // 이 배열 안에 양식에 맞춰 주관식, 객관식 문제를 계속 누적해 추가할 수 있어!
        const quizList = [
            {
                type: "choice",
                q: "Q. 다음 중 고구려의 전성기를 이끌었으며, 신라를 도와 왜구를 격퇴한 왕은 누구인가요?",
                c: ["① 근초고왕", "② 광개토대왕", "③ 장수왕", "④ 무령왕"],
                a: 1,
                e: "🎯 정답은 ② 광개토대왕! 신라 내물왕의 구원 요청을 받아 왜구를 격퇴했습니다."
            },
            {
                type: "short",
                q: "Q. 조선 제4대 왕으로, 집현전을 설치하고 훈민정음을 창제하신 임금의 이름을 입력하세요.",
                a: "세종대왕",
                e: "🎯 정답은 세종대왕! 백성들을 위해 과학, 문화, 민생 등 다방면에서 위대한 업적을 남기셨습니다."
            },
            {
                type: "choice",
                q: "Q. 1919년 일제 강점기 최대 규모의 민족 운동이자, 대한민국 임시 정부 수립의 계기가 된 운동은?",
                c: ["① 3·1 운동", "② 6·10 만세 운동", "③ 광주 학생 항일 운동", "④ 임오군란"],
                a: 0,
                e: "🎯 정답은 ① 3·1 운동! 전 민족이 참여한 역사적인 대규모 독립운동입니다."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let combo = 0;
        let isAnswered = false;

        const qEl = document.getElementById('question');
        const intBox = document.getElementById('interaction-box');
        const fBox = document.getElementById('feedback');
        const actBtn = document.getElementById('action-btn');
        const scoreEl = document.getElementById('score-board');

        function initGame() {
            currentIdx = 0;
            score = 0;
            combo = 0;
            updateScoreBoard();
            loadQuiz();
        }

        function loadQuiz() {
            isAnswered = false;
            fBox.style.display = 'none';
            actBtn.style.display = 'none';
            intBox.innerHTML = '';

            if(currentIdx < quizList.length) {
                const currentQuiz = quizList[currentIdx];
                qEl.innerText = currentQuiz.q;

                if (currentQuiz.type === "choice") {
                    const choicesContainer = document.createElement('div');
                    choicesContainer.classList.add('choices-container');
                    
                    currentQuiz.c.forEach((choice, index) => {
                        const button = document.createElement('button');
                        button.classList.add('choice-btn');
                        button.innerText = choice;
                        button.onclick = () => checkChoiceAnswer(index, button);
                        choicesContainer.appendChild(button);
                    });
                    intBox.appendChild(choicesContainer);
                    
                    document.activeElement.blur();
                } 
                else if (currentQuiz.type === "short") {
                    const inputContainer = document.createElement('div');
                    inputContainer.classList.add('input-container');

                    const input = document.createElement('input');
                    input.type = "text";
                    input.classList.add('answer-input');
                    input.placeholder = "정답을 입력하세요 (예: 홍길동)";
                    input.id = "user-input";

                    input.onkeypress = (e) => { 
                        if(e.key === 'Enter') {
                            if(!isAnswered) {
                                checkShortAnswer();
                            }
                        } 
                    };

                    const submitBtn = document.createElement('button');
                    submitBtn.classList.add('submit-btn');
                    submitBtn.innerText = "정답 검사하기 ✔️";
                    submitBtn.onclick = checkShortAnswer;

                    inputContainer.appendChild(input);
                    inputContainer.appendChild(submitBtn);
                    intBox.appendChild(inputContainer);
                    input.focus();
                }
            } else {
                qEl.innerHTML = `🎉 대한민국 역사 마스터 완료! 🎉<br><br>최종 점수: <span style="color:#00f2fe">${score}점</span>`;
                actBtn.innerText = "처음부터 다시 도전하기 🔄";
                actBtn.style.display = 'block';
                actBtn.focus();
            }
        }

        function checkChoiceAnswer(selectedIdx, clickedBtn) {
            if(isAnswered) return;
            isAnswered = true;

            const currentQuiz = quizList[currentIdx];
            const allButtons = intBox.querySelectorAll('.choice-btn');

            if(selectedIdx === currentQuiz.a) {
                combo++;
                score += 100 + (combo * 10);
                clickedBtn.classList.add('correct');
                showFeedback(true, currentQuiz.e);
            } else {
                combo = 0;
                clickedBtn.classList.add('wrong');
                allButtons[currentQuiz.a].classList.add('correct');
                showFeedback(false, currentQuiz.e);
            }
            showNextControls();
        }

        function checkShortAnswer() {
            if(isAnswered) return;
            
            const inputEl = document.getElementById('user-input');
            const userAnswer = inputEl.value.trim();
            if(!userAnswer) return;

            isAnswered = true;
            inputEl.disabled = true;
            intBox.querySelector('.submit-btn').style.display = 'none';

            const currentQuiz = quizList[currentIdx];

            if(userAnswer === currentQuiz.a) {
                combo++;
                score += 100 + (combo * 10);
                inputEl.style.background = 'rgba(0, 176, 155, 0.2)';
                inputEl.style.borderColor = '#00b09b';
                showFeedback(true, currentQuiz.e);
            } else {
                combo = 0;
                inputEl.style.background = 'rgba(255, 65, 108, 0.2)';
                inputEl.style.borderColor = '#ff416c';
                showFeedback(false, `제출한 정답: ${userAnswer}\n\n정답은 [ ${currentQuiz.a} ] 입니다!\n\n${currentQuiz.e}`);
            }
            showNextControls();
        }

        function showFeedback(isCorrect, text) {
            fBox.style.color = isCorrect ? '#00ff7f' : '#ff416c';
            fBox.innerText = isCorrect ? "⭕ 정답입니다!\n\n" + text : "❌ 오답입니다!\n\n" + text;
            fBox.style.display = 'block';
            updateScoreBoard();
        }

        function showNextControls() {
            actBtn.innerText = "다음 문제로 전진 ➡️";
            actBtn.style.display = 'block';
        }

        function handleActionClick() {
            if(currentIdx < quizList.length) {
                currentIdx++;
                loadQuiz();
            } else {
                initGame();
            }
        }

        function updateScoreBoard() {
            scoreEl.innerText = `SCORE: ${String(score).padStart(3, '0')} | COMBO: ${combo}`;
        }

        // 전역 엔터키 감지: 결과 해설창이 열린 상태에서 엔터를 치면 다음 문제로 넘어감
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (actBtn.style.display === 'block') {
                    handleActionClick();
                }
            }
        });

        initGame();
    </script>
</body>
</html>
